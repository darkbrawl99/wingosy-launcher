<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="236" rx="80" ry="80" fill="url(#shine)" opacity="0.3"/>
  
  <!-- Game controller shape -->
  <g transform="translate(256, 256)" fill="#FFFFFF">
    <!-- Controller body -->
    <ellipse cx="0" cy="0" rx="160" ry="100" fill="white" opacity="0.95"/>
    
    <!-- Left grip -->
    <ellipse cx="-120" cy="40" rx="50" ry="70" fill="white" opacity="0.95"/>
    
    <!-- Right grip -->
    <ellipse cx="120" cy="40" rx="50" ry="70" fill="white" opacity="0.95"/>
    
    <!-- D-pad -->
    <g transform="translate(-70, -10)">
      <rect x="-8" y="-25" width="16" height="50" rx="3" fill="#6366f1"/>
      <rect x="-25" y="-8" width="50" height="16" rx="3" fill="#6366f1"/>
    </g>
    
    <!-- Buttons (ABXY style) -->
    <g transform="translate(70, -10)">
      <circle cx="0" cy="-20" r="12" fill="#6366f1"/>
      <circle cx="20" cy="0" r="12" fill="#6366f1"/>
      <circle cx="0" cy="20" r="12" fill="#6366f1"/>
      <circle cx="-20" cy="0" r="12" fill="#6366f1"/>
    </g>
    
    <!-- Center buttons -->
    <rect x="-20" y="20" width="15" height="8" rx="2" fill="#6366f1"/>
    <rect x="5" y="20" width="15" height="8" rx="2" fill="#6366f1"/>
    
    <!-- Analog sticks -->
    <circle cx="-35" cy="35" r="18" fill="#e0e7ff" stroke="#6366f1" stroke-width="3"/>
    <circle cx="35" cy="35" r="18" fill="#e0e7ff" stroke="#6366f1" stroke-width="3"/>
  </g>
  
  <!-- W letter overlay -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">W</text>
</svg>
